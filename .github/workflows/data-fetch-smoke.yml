name: Data fetch smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".devcontainer/**"
      - "Makefile"
      - ".github/workflows/data-fetch-smoke.yml"

jobs:
  fetch-smoke:
    name: Private dataset fetch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Fetch dataset release asset
        env:
          DATA_REPO_PAT: ${{ secrets.DATA_REPO_PAT }}
          DATA_REPO_OWNER: AstroCan17
          DATA_REPO_NAME: s2-msi-raw-generator-data
          DATASET_TAG: datasets-v1
          DATA_DIR: data
        run: bash .devcontainer/scripts/fetch-input-data.sh

      - name: Verify store layout
        run: |
          test -f data/.dataset_tag
          test -d data/inputs
          echo "Fetched tag: $(cat data/.dataset_tag)"
