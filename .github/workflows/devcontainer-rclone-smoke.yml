name: Devcontainer rclone smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer-rclone-smoke.yml"
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer-rclone-smoke.yml"

jobs:
  rclone-smoke:
    name: rclone install + connectivity (no download)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: bash .devcontainer/scripts/install-rclone.sh

      - name: Inject rclone config from secret
        env:
          RCLONE_CONF_B64: ${{ secrets.RCLONE_CONF_B64 }}
        run: bash .devcontainer/scripts/inject-rclone-config.sh

      - name: Verify rclone smoke (no dataset transfer)
        env:
          VERIFY_RCLONE_REQUIRED: "1"
        run: bash .devcontainer/scripts/verify-rclone.sh
