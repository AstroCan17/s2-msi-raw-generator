# Minimal CI for s2_msi_raw_generator. Lean and portable (public python image) so a freshly-registered
# runner can pull it without EOPF registry credentials. Swap `image:` to
# registry.eopf.copernicus.eu/sde/cpm-build-environment:latest once the SDE runner is wired,
# and add quality/build/docs stages (cf. ipf/msi-processor) as the project matures.

stages:
  - test
  - docs

unit-tests:
  stage: test
  image: python:3.12-slim
  interruptible: true
  before_script:
    - python -m pip install --upgrade pip
    - pip install numpy pytest zarr
  script:
    - python -m pytest tests/ -q --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml
    expire_in: 1 week

# Real L0→L1B E2E in a full eopf==2.8.1 + msi_processor environment (the same chain the SDE runs):
# generator L0 + cal-DB → l0_decode → radiometric → enhancement → toa → persisted L1B + quicklooks.
# Manual (heavy env install); msi-processor is cloned with CI_JOB_TOKEN — the generator project is on
# ipf/msi-processor's job-token allowlist. Artifacts carry the L1B product + the quicklook PNGs.
e2e-l1b:
  stage: test
  image: python:3.11-slim
  interruptible: true
  timeout: 30m
  before_script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null
    - python -m pip install -q --upgrade pip
    # the shell runner persists /tmp between jobs — drop any stale clone first
    - rm -rf /tmp/msi-processor
    - git clone --depth 1 "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/ipf/msi-processor.git" /tmp/msi-processor
    - pip install -q "eopf==2.8.1" /tmp/msi-processor
    - pip install -q -e . pytest
  script:
    - python scripts/run_pipeline.py e2e-store --synthetic
    # Full suite under the eopf env (zarr 2.18) — locks in the dual-zarr (2/3) compatibility promise.
    - python -m pytest tests/ -q
  artifacts:
    paths:
      - e2e-store/quicklook/
      - e2e-store/l1b/
    expire_in: 1 week
  rules:
    - when: manual
      allow_failure: true

# Windowed real-L1A E2E (REQ-FUNC-093): bucket L1A (first 4096 lines) → compressed-ISP L0 →
# ground decode → msi-processor l0_decode → L1A′ bit-identity + report. Manual (downloads
# ~500 MB + builds the eopf env); the authoritative full-frame run happens on the SDE store.
e2e-real-l1a:
  stage: test
  image: python:3.11-slim
  interruptible: true
  timeout: 45m
  before_script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null
    - python -m pip install -q --upgrade pip
    # the shell runner persists /tmp between jobs — drop any stale clone first
    - rm -rf /tmp/msi-processor
    - git clone --depth 1 "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/ipf/msi-processor.git" /tmp/msi-processor
    - pip install -q "eopf==2.8.1" /tmp/msi-processor
    - pip install -q -e . pytest
  script:
    - python scripts/run_pipeline.py e2e-real-store
        --phases fetch-l1a,preflight,package,ground-decode,l0-decode,validate,quicklook,report
        --lines 4096
  artifacts:
    when: always
    paths:
      - e2e-real-store/report/
      - e2e-real-store/quicklook/
    expire_in: 1 week
  rules:
    - when: manual
      allow_failure: true

# Publish the authoritative real-data E2E results from the SDE store (the runner shares the
# Studio filesystem): products → Generic Package Registry (CI_JOB_TOKEN, PSFD .zarr.zip names),
# report + quicklooks → job artifacts. Manual; set PUBLISH_STORE if the store moved.
# Publish the SDE store to the shared ipf/data-store registry (manual). PKG/VER are
# job variables (set them when triggering); the phase zips products, uploads them with
# the job token (allowlisted on ipf/data-store) and refreshes the manifest.
publish-datastore:
  stage: docs
  variables:
    PUBLISH_STORE: /home/jovyan/data-store
    PKG: e2e-real
    VER: 0.3.0
    LAYER: products
  script:
    - test -d "$PUBLISH_STORE/report" || { echo "store not found - $PUBLISH_STORE"; exit 1; }
    - >-
      python scripts/run_pipeline.py "$PUBLISH_STORE" --phases publish-store
      --publish-name "$PKG" --publish-version "$VER" --publish-layer "$LAYER"
      --publish-source "SDE store publish ($CI_JOB_URL)"
  rules:
    - when: manual
      allow_failure: true

# Build the Sphinx documentation site and publish it to GitLab Pages. Runs on the default
# branch (publishes) and on merge requests (build-only validation; GitLab deploys Pages only
# from the default branch). The DRD set is markdown (myst-parser) + autodoc of the package.
pages:
  stage: docs
  image: python:3.12-slim
  interruptible: true
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e ".[docs]"
  script:
    - SPHINX_RELEASE="$CI_COMMIT_SHORT_SHA" sphinx-build -b html -W --keep-going docs public
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
