# Minimal CI for s2_msi_raw_generator. Lean and portable (public python image) so a freshly-registered
# runner can pull it without EOPF registry credentials. Swap `image:` to
# registry.eopf.copernicus.eu/sde/cpm-build-environment:latest once the SDE runner is wired,
# and add quality/build/docs stages (cf. ipf/msi-processor) as the project matures.

stages:
  - test
  - docs

unit-tests:
  stage: test
  image: python:3.12-slim
  interruptible: true
  before_script:
    - python -m pip install --upgrade pip
    - pip install numpy pytest zarr
  script:
    - python -m pytest tests/ -q --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml
    expire_in: 1 week

# Real L0→L1B E2E in a full eopf==2.8.1 + msi_processor environment (the same chain the SDE runs):
# generator L0 + cal-DB → l0_decode → radiometric → enhancement → toa → persisted L1B + quicklooks.
# Manual (heavy env install); msi-processor is cloned with CI_JOB_TOKEN — the generator project is on
# ipf/msi-processor's job-token allowlist. Artifacts carry the L1B product + the quicklook PNGs.
# Calibration campaign smoke (REQ-FUNC-048) — numpy+zarr only, no eopf needed: synthesizes
# the dark (DASC) + sun-diffuser (ABSR) acquisitions, packages them as real downlink L0
# products (S02MSIDCA/S02MSISCA, compressed ISPs) and derives the Option-Y cal-DB.
pipeline-calibration:
  stage: test
  image: python:3.12-slim
  interruptible: true
  timeout: 15m
  before_script:
    - pip install -q numpy zarr
    - pip install -q -e . --no-deps
  variables:
    S2_DATA_STORE: cal-store
    S2_E2ES_NDET: "64"
    S2_E2ES_CAL_LINES: "64"
  script:
    - python scripts/run_pipeline.py calibration
  artifacts:
    paths:
      - cal-store/report/
      - cal-store/quicklook/
    expire_in: 1 week
  rules:
    - when: manual
      allow_failure: true

# Windowed nominal-chain E2E (REQ-FUNC-093): bucket L1A (first 4096 lines) → compressed-ISP L0 →
# ground decode → msi-processor l0_decode → L1A′ bit-identity + report. Manual (downloads
# ~500 MB + builds the eopf env); the authoritative full-frame run happens on the SDE store.
e2e-real-l1a:
  stage: test
  image: python:3.11-slim
  interruptible: true
  timeout: 45m
  before_script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null
    - python -m pip install -q --upgrade pip
    # the shell runner persists /tmp between jobs — drop any stale clone first
    - rm -rf /tmp/msi-processor
    - git clone --depth 1 "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/ipf/msi-processor.git" /tmp/msi-processor
    - pip install -q "eopf==2.8.1" /tmp/msi-processor
    - pip install -q -e . pytest
  variables:
    S2_DATA_STORE: e2e-real-store
    S2_E2ES_PHASES: fetch-l1a,preflight,package,ground-decode,l0-decode,validate,quicklook,report
    S2_E2ES_LINES: "4096"
  script:
    - python scripts/run_pipeline.py
  artifacts:
    when: always
    paths:
      - e2e-real-store/report/
      - e2e-real-store/quicklook/
    expire_in: 1 week
  rules:
    - when: manual
      allow_failure: true

# Publish the SDE store to the shared ipf/data-store registry (manual; the runner shares the
# Studio filesystem). The knobs are job variables (override when triggering): S2_DATA_STORE
# if the store moved, S2_E2ES_PUBLISH_NAME/VERSION for the immutable package; the phase zips
# products, uploads them with the job token (allowlisted on ipf/data-store) and refreshes
# the manifest (provenance is stamped from CI_JOB_URL automatically).
publish-datastore:
  stage: docs
  variables:
    S2_DATA_STORE: /home/jovyan/data-store
    S2_E2ES_PHASES: publish-store
    S2_E2ES_PUBLISH_NAME: e2e-real
    S2_E2ES_PUBLISH_VERSION: "0.3.0"
    S2_E2ES_PUBLISH_LAYER: products
  script:
    - test -d "$S2_DATA_STORE/report" || { echo "store not found - $S2_DATA_STORE"; exit 1; }
    - python scripts/run_pipeline.py
  rules:
    - when: manual
      allow_failure: true

# Build the Sphinx documentation site and publish it to GitLab Pages. Runs on the default
# branch (publishes) and on merge requests (build-only validation; GitLab deploys Pages only
# from the default branch). The DRD set is markdown (myst-parser) + autodoc of the package.
pages:
  stage: docs
  image: python:3.12-slim
  interruptible: true
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e ".[docs]"
  script:
    - SPHINX_RELEASE="$CI_COMMIT_SHORT_SHA" sphinx-build -b html -W --keep-going docs public
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
